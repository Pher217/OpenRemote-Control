# deploy/matrix/whatsapp/config.sample.yaml
#
# Template for mautrix-whatsapp.  Run the bridge container once to generate
# the real config.yaml, then edit it using this file as a reference.
#
# Docs: https://docs.mau.fi/bridges/go/whatsapp/index.html

homeserver:
  address: http://synapse:8008
  domain: matrix.example.com        # <-- your MATRIX_DOMAIN (no https://)

appservice:
  address: http://whatsapp-bridge:29318
  hostname: 0.0.0.0
  port: 29318

bridge:
  # Username pattern for WhatsApp contacts in Matrix
  username_template: "whatsapp_{{.}}"
  displayname_template: "{{if .PushName}}{{.PushName}}{{else if .BusinessName}}{{.BusinessName}}{{else}}{{.JID}}{{end}} (WhatsApp)"

  # Relay mode: messages from non-logged-in Matrix users are relayed through
  # the bridge puppet using the format below.
  relay:
    enabled: true
    message_formats:
      m.text: "{{ .Sender.Displayname }}: {{ .Message }}"
      m.image: "{{ .Sender.Displayname }} sent an image"
      m.file: "{{ .Sender.Displayname }} sent a file"

  # Permissions:
  #   The operator MXID gets full admin access.
  #   Users on the homeserver domain get standard user access.
  #   Everyone else is relay-only.
  permissions:
    "@operator:matrix.example.com": admin   # <-- replace with your operator MXID
    "matrix.example.com": user              # <-- your MATRIX_DOMAIN
    "*": relay

logging:
  min_level: info
  writers:
    - type: stdout
      format: json
