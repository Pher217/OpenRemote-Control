---
# deploy/matrix/docker-compose.yml
# Bring up: docker compose -f deploy/matrix/docker-compose.yml up -d
#
# Before first start, generate the Synapse config:
#   docker run --rm -v $(pwd)/synapse/data:/data \
#     -e SYNAPSE_SERVER_NAME=${MATRIX_DOMAIN} \
#     -e SYNAPSE_REPORT_STATS=no \
#     matrixdotorg/synapse:v1.154.0 generate
# Then edit synapse/data/homeserver.yaml (see synapse/homeserver.sample.yaml).
#
# After synapse is running, generate bridge registrations:
#   docker compose -f deploy/matrix/docker-compose.yml run --rm whatsapp-bridge
#   docker compose -f deploy/matrix/docker-compose.yml run --rm slack-bridge
# Copy the produced registration.yaml files into synapse/data/appservices/.

name: orc-matrix

services:

  # -- PostgreSQL for Matrix (separate from app postgres) -------------------
  matrix-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${MATRIX_POSTGRES_PASSWORD}
      # Synapse requires C locale
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - matrix_postgres_data:/var/lib/postgresql/data
    networks:
      - matrix
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -- Synapse homeserver ---------------------------------------------------
  synapse:
    image: matrixdotorg/synapse:v1.154.0
    restart: unless-stopped
    volumes:
      - ./synapse/data:/data
    depends_on:
      matrix-postgres:
        condition: service_healthy
    networks:
      - matrix
    healthcheck:
      test: ["CMD-SHELL",
             "curl -fsSL http://localhost:8008/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # -- mautrix-whatsapp bridge ----------------------------------------------
  # Generate config: docker compose run --rm whatsapp-bridge
  # Registration file will be written to ./whatsapp/registration.yaml
  # Copy that file into ./synapse/data/appservices/ before starting Synapse.
  whatsapp-bridge:
    image: dock.mau.dev/mautrix/whatsapp:v26.05
    restart: unless-stopped
    volumes:
      - ./whatsapp:/data
    depends_on:
      synapse:
        condition: service_healthy
    networks:
      - matrix

  # -- mautrix-slack bridge -------------------------------------------------
  # Same flow as whatsapp-bridge above.
  slack-bridge:
    image: dock.mau.dev/mautrix/slack:v26.05
    restart: unless-stopped
    volumes:
      - ./slack:/data
    depends_on:
      synapse:
        condition: service_healthy
    networks:
      - matrix

volumes:
  matrix_postgres_data:

networks:
  matrix:
    name: orc_matrix
