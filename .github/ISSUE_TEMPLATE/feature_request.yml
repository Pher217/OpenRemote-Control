name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the behaviour or API if you can.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - new runtime adapter (agent CLI)
        - MCP bridge / orc-mcp
        - chat surface (Telegram / Matrix / other)
        - multi-host / host daemon
        - policy / approvals / audit
        - deploy / ops
        - frontend / PWA
        - other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
