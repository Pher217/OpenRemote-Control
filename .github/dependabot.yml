version: 2
updates:
  # Backend (Django) Python deps
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    ignore:
      # pytest is deliberately pinned <9 for a reproducible test env (#32).
      # Revisit when pytest 9 ships and the suite is verified against it.
      - dependency-name: "pytest"
        update-types: ["version-update:semver-major"]

  # Host daemon Python deps
  - package-ecosystem: "pip"
    directory: "/host-agent"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "host-agent"
    ignore:
      # pytest is deliberately pinned <9 for a reproducible test env (#32).
      - dependency-name: "pytest"
        update-types: ["version-update:semver-major"]

  # orc-mcp connector Python deps
  - package-ecosystem: "pip"
    directory: "/connectors/orc-mcp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "connectors"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
