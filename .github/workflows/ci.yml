name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: agent_command_center
          POSTGRES_USER: acc_user
          POSTGRES_PASSWORD: acc_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      valkey:
        image: valkey/valkey:8
        options: >-
          --health-cmd "echo PING | nc -w 3 localhost 6379 | grep -q PONG"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint with ruff
        working-directory: backend
        run: python -m ruff check .
      - name: Type check with mypy (advisory)
        working-directory: backend
        # Non-blocking: gradual typing adoption. Remove `|| true` once the
        # codebase is clean under django-stubs.
        run: python -m mypy --ignore-missing-imports . || true
      - name: Security check with bandit
        working-directory: backend
        run: python -m bandit -r apps config --skip B101 -x '*/tests/*' --severity-level medium -q
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://acc_user:acc_password@localhost:5432/agent_command_center
        run: python -m pytest

  host-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install host-agent dependencies
        working-directory: host-agent
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint with ruff
        working-directory: host-agent
        run: python -m ruff check .
      - name: Security check with bandit
        working-directory: host-agent
        run: python -m bandit -r agent_host --skip B101 -x '*/tests/*' --severity-level medium -q
      - name: Run tests
        working-directory: host-agent
        run: python -m pytest

  orc-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: connectors/orc-mcp/pyproject.toml
      - name: Install orc-mcp dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e 'connectors/orc-mcp[dev]'
      - name: Run tests
        run: python -m pytest connectors/orc-mcp/tests -q

  messaging-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: connectors/messaging-gateway/package-lock.json
      - name: Install messaging-gateway dependencies
        working-directory: connectors/messaging-gateway
        run: npm ci
      - name: Run tests
        working-directory: connectors/messaging-gateway
        run: npm test
