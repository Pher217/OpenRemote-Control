version: "3.9"
services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: openremote_control
      POSTGRES_USER: acc_user
      POSTGRES_PASSWORD: acc_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acc_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    command: ["valkey-server", "--bind", "0.0.0.0", "--port", "6379"]
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD-SHELL", "echo PING | nc -w 3 localhost 6379 | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ntfy re-added with notifications (Phase 9)

volumes:
  postgres-data:
  valkey-data:
